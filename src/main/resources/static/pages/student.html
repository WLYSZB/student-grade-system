<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生端 - 学生成绩管理系统</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <span class="navbar-brand">学生成绩管理系统</span>
        <div class="navbar-user">
            <span id="userInfo"></span>
            <button class="btn btn-sm btn-danger" onclick="logout()">退出登录</button>
        </div>
    </nav>
    <div class="layout">
        <ul class="sidebar sidebar-menu">
            <li class="active" onclick="showSection('query')">成绩查询</li>
            <li onclick="showSection('analysis')">成绩分析</li>
            <li onclick="showSection('notice')">通知查看</li>
        </ul>
        <div class="content">
            <div id="query-section" class="card">
                <div class="card-header">
                    <h3>成绩查询</h3>
                    <div>
                        <select id="semesterFilter" style="padding: 6px; margin-right: 10px;">
                            <option value="">全部学期</option>
                        </select>
                        <button class="btn btn-sm btn-primary" onclick="queryGrades()">查询</button>
                    </div>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>学期</th>
                            <th>课程名称</th>
                            <th>学分</th>
                            <th>成绩</th>
                            <th>绩点</th>
                        </tr>
                    </thead>
                    <tbody id="gradeTableBody"></tbody>
                </table>
                <div style="margin-top: 20px; padding: 15px; background: #fafafa; border-radius: 4px;">
                    <strong>GPA: </strong><span id="gpaValue">--</span>
                </div>
            </div>
            <div id="analysis-section" class="card" style="display:none">
                <div class="card-header">
                    <h3>成绩分析</h3>
                </div>
                <div style="padding: 20px; color: #666;">
                    <p>个人成绩趋势图、各科对比图、GPA计算等功能</p>
                    <p style="margin-top: 10px;"><em>由成员4实现完整功能</em></p>
                </div>
            </div>
            <div id="notice-section" class="card" style="display:none">
                <div class="card-header">
                    <h3>通知公告</h3>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>标题</th>
                            <th>发布时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="noticeTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const user = JSON.parse(sessionStorage.getItem('currentUser'));
        if (!user || user.role !== 'STUDENT') {
            window.location.href = '/pages/login.html';
        }
        document.getElementById('userInfo').textContent = '学生: ' + user.username;

        function showSection(section) {
            document.querySelectorAll('.content .card').forEach(el => el.style.display = 'none');
            document.getElementById(section + '-section').style.display = 'block';
            document.querySelectorAll('.sidebar-menu li').forEach(el => el.classList.remove('active'));
            event.target.classList.add('active');
        }

        function logout() {
            sessionStorage.removeItem('currentUser');
            window.location.href = '/pages/login.html';
        }

        // TODO: 成员4 - 实现成绩查询、分析、通知的完整功能
        function queryGrades() { alert('功能开发中 - 由成员4实现'); }
    </script>
</body>
</html>
